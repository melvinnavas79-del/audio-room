<!DOCTYPE html>
<html>
<head>
  <title>Coravox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #6a11cb, #ff4ecd);
      color: white;
      padding-top: 100px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: pink;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>🔥 Coravox</h1>

<input id="username" placeholder="Tu nombre">

<br>

<button onclick="createRoom()">Crear sala</button>

<script>
function createRoom() {
  let name = document.getElementById("username").value;

  if (!name) {
    alert("Escribe tu nombre");
    return;
  }

  localStorage.setItem("username", name);

  let roomId = Math.random().toString(36).substring(7);
  window.location.href = "/room.html?room=" + roomId;
}
</script>

</body>
</html>
