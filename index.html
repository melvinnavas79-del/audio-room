<!DOCTYPE html>
<html>
<head>
  <title>Coravox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6a11cb, #ff4ecd);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .btn {
      background: #ff4ecd;
      border: none;
      padding: 15px 30px;
      border-radius: 30px;
      color: white;
      font-size: 18px;
      margin: 10px;
    }

    .box {
      background: rgba(255,255,255,0.1);
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>🔥 Coravox</h1>

<div class="box">
  <button class="btn" onclick="createRoom()">Crear sala</button><br>
  <input id="roomInput" placeholder="ID sala">
  <button class="btn" onclick="joinRoom()">Unirse</button>
</div>

<div class="box">
  <h3>🎤 Salas activas</h3>
  <p>(Pronto aquí aparecerán)</p>
</div>

<script>
function createRoom(){
  alert("Sala creada 🔥");
}

function joinRoom(){
  let room = document.getElementById("roomInput").value;
  alert("Entrando a sala: " + room);
}
</script>

</body>
</html>
