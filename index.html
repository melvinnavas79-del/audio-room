<!DOCTYPE html>
<html>
<head>
  <title>Coravox</title>
</head>

<body style="text-align:center; margin-top:100px; font-family:Arial;">

<h1>🔥 Coravox</h1>

<input id="name" placeholder="Tu nombre"><br><br>

<button onclick="crear()">Crear sala</button>
<button onclick="entrar()">Entrar</button>

<script>
function crear(){
  let name = document.getElementById("name").value;
  if(!name) return alert("Escribe tu nombre");

  localStorage.setItem("username", name);

  let room = Math.random().toString(36).substring(7);
  window.location = "/room.html?room=" + room;
}

function entrar(){
  let name = document.getElementById("name").value;
  let room = prompt("ID de sala");

  if(!name || !room) return;

  localStorage.setItem("username", name);
  window.location = "/room.html?room=" + room;
}
</script>

</body>
</html>
