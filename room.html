<!DOCTYPE html>
<html>
<head>
  <title>Sala Coravox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6a11cb, #ff4ecd);
      color: white;
      text-align: center;
    }

    #users {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .user {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .mic, .giftBtn {
      position: fixed;
      bottom: 100px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 25px;
    }

    .mic { left: 20px; background: pink; }
    .giftBtn { right: 20px; background: gold; }

    .menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #222;
      display: none;
      flex-wrap: wrap;
    }

    .giftItem {
      width: 20%;
      padding: 10px;
      font-size: 25px;
    }
  </style>
</head>

<body>

<h2>🎤 Sala</h2>

<div id="users"></div>

<div class="mic" onclick="toggleMute()" id="micBtn">🎤</div>
<div class="giftBtn" onclick="toggleMenu()">🎁</div>

<div class="menu" id="menu">
  <div class="giftItem" onclick="sendGift('💋')">💋</div>
  <div class="giftItem" onclick="sendGift('❤️')">❤️</div>
  <div class="giftItem" onclick="sendGift('🌹')">🌹</div>
  <div class="giftItem" onclick="sendGift('💎')">💎</div>
  <div class="giftItem" onclick="sendGift('👑')">👑</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const params = new URLSearchParams(window.location.search);
const roomId = params.get("room");
const myName = localStorage.getItem("username") || "User";

let stream;
let peerConnections = {};
let isMuted = false;

const usersDiv = document.getElementById("users");

// 👥 usuarios
function addUser(id, name) {
  const div = document.createElement("div");
  div.className = "user";
  div.id = id;
  div.innerHTML = "👤<br>" + name;
  usersDiv.appendChild(div);
}

function removeUser(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// 🎤 obtener audio
navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
  stream = s;

  addUser(socket.id, myName);

  socket.emit("join-room", {
    roomId,
    name: myName
  });
});

// 🔇 mute
function toggleMute() {
  isMuted = !isMuted;
  stream.getAudioTracks()[0].enabled = !isMuted;
  document.getElementById("micBtn").innerHTML = isMuted ? "🔇" : "🎤";
}

// 🎁 menú
function toggleMenu() {
  const m = document.getElementById("menu");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
}

// 🎁 regalos
function sendGift(icon) {
  socket.emit("send-gift", { roomId, icon });
}

socket.on("receive-gift", ({ icon }) => {
  const div = document.createElement("div");
  div.style.position = "fixed";
  div.style.top = "40%";
  div.style.left = "50%";
  div.style.transform = "translate(-50%, -50%)";
  div.style.fontSize = "60px";
  div.innerHTML = icon;

  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1000);
});

// 🔥 WEBRTC
function createPeer(userId) {
  const peer = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  stream.getTracks().forEach(track => peer.addTrack(track, stream));

  peer.ontrack = (event) => {
    const audio = document.createElement("audio");
    audio.srcObject = event.streams[0];
    audio.play();
  };

  peer.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", {
        candidate: event.candidate,
        to: userId
      });
    }
  };

  return peer;
}

// eventos
socket.on("user-connected", async ({ id, name }) => {
  addUser(id, name);

  const peer = createPeer(id);
  peerConnections[id] = peer;

  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);

  socket.emit("offer", { offer, to: id });
});

socket.on("offer", async ({ offer, from }) => {
  const peer = createPeer(from);
  peerConnections[from] = peer;

  await peer.setRemoteDescription(offer);

  const answer = await peer.createAnswer();
  await peer.setLocalDescription(answer);

  socket.emit("answer", { answer, to: from });
});

socket.on("answer", async ({ answer, from }) => {
  await peerConnections[from].setRemoteDescription(answer);
});

socket.on("ice-candidate", async ({ candidate, from }) => {
  if (peerConnections[from]) {
    await peerConnections[from].addIceCandidate(candidate);
  }
});

socket.on("user-disconnected", (id) => {
  removeUser(id);
});
</script>

</body>
</html>
