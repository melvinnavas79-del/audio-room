<!DOCTYPE html>
<html>
<head>
  <title>Sala - Coravox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6a11cb, #ff4ecd);
      color: white;
      text-align: center;
    }

    h2 { margin-top: 20px; }

    #users {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .user {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
    }

    .mic {
      position: fixed;
      bottom: 100px;
      left: 20px;
      width: 70px;
      height: 70px;
      background: pink;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .exit {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: black;
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
    }
  </style>
</head>

<body>

<h2>🎤 Sala de voz</h2>

<div id="users"></div>

<div class="mic" onclick="toggleMute()" id="micBtn">🎤</div>

<button class="exit" onclick="window.location.href='/'">Salir</button>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const params = new URLSearchParams(window.location.search);
const roomId = params.get("room");

let peer;
let stream;
let isMuted = false;

const usersDiv = document.getElementById("users");

// 👥 USUARIOS
function addUser(id) {
  const div = document.createElement("div");
  div.className = "user";
  div.id = id;
  div.innerHTML = "👤";
  usersDiv.appendChild(div);
}

function removeUser(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// 🎤 MICRO
navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
  stream = s;

  addUser(socket.id);

  const myAudio = document.createElement("audio");
  myAudio.srcObject = stream;
  myAudio.muted = true;
  myAudio.play();

  socket.emit("join-room", roomId);
});

// 🔇 MUTE
function toggleMute() {
  if (!stream) return;

  isMuted = !isMuted;

  stream.getAudioTracks().forEach(track => {
    track.enabled = !isMuted;
  });

  const btn = document.getElementById("micBtn");

  if (isMuted) {
    btn.innerHTML = "🔇";
    btn.style.background = "gray";
  } else {
    btn.innerHTML = "🎤";
    btn.style.background = "pink";
  }
}

// 🔥 PEER
function createPeer(userId) {
  const peer = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      {
        urls: "turn:openrelay.metered.ca:80",
        username: "openrelayproject",
        credential: "openrelayproject"
      }
    ]
  });

  peer.ontrack = (event) => {
    const audio = document.createElement("audio");
    audio.srcObject = event.streams[0];
    audio.play();
  };

  peer.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", {
        candidate: event.candidate,
        userId
      });
    }
  };

  return peer;
}

// 👇 EVENTOS
socket.on("user-connected", async (userId) => {
  addUser(userId);

  peer = createPeer(userId);

  stream.getTracks().forEach(track => peer.addTrack(track, stream));

  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);

  socket.emit("offer", { offer, userId });
});

socket.on("offer", async ({ offer, userId }) => {
  addUser(userId);

  peer = createPeer(userId);

  stream.getTracks().forEach(track => peer.addTrack(track, stream));

  await peer.setRemoteDescription(offer);

  const answer = await peer.createAnswer();
  await peer.setLocalDescription(answer);

  socket.emit("answer", { answer, userId });
});

socket.on("answer", async ({ answer }) => {
  await peer.setRemoteDescription(answer);
});

socket.on("ice-candidate", async ({ candidate }) => {
  if (peer) {
    await peer.addIceCandidate(candidate);
  }
});

socket.on("user-disconnected", (userId) => {
  removeUser(userId);
});
</script>

</body>
</html>
