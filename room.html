<!DOCTYPE html>
<html>
<head>
  <title>Sala</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #6a11cb, #ff4ecd);
      color: white;
    }

    #users {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .user {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .mic, .giftBtn {
      position: fixed;
      bottom: 100px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 25px;
    }

    .mic { left: 20px; background: pink; }
    .giftBtn { right: 20px; background: gold; }

    .menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #222;
      display: none;
      flex-wrap: wrap;
    }

    .giftItem {
      width: 20%;
      padding: 10px;
      font-size: 25px;
    }

    .gift-animation {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      animation: pop 1s ease;
    }

    @keyframes pop {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.5); }
      100% { opacity: 0; }
    }
  </style>
</head>

<body>

<h2>🎤 Sala</h2>

<div id="users"></div>

<div class="mic" onclick="toggleMute()" id="micBtn">🎤</div>
<div class="giftBtn" onclick="toggleMenu()">🎁</div>

<div class="menu" id="menu">
  <div class="giftItem" onclick="sendGift('💋')">💋</div>
  <div class="giftItem" onclick="sendGift('❤️')">❤️</div>
  <div class="giftItem" onclick="sendGift('🌹')">🌹</div>
  <div class="giftItem" onclick="sendGift('💎')">💎</div>
  <div class="giftItem" onclick="sendGift('👑')">👑</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const params = new URLSearchParams(window.location.search);
const roomId = params.get("room");
const myName = localStorage.getItem("username") || "User";

let stream;
let isMuted = false;

const usersDiv = document.getElementById("users");

// usuarios
function addUser(id, name) {
  const div = document.createElement("div");
  div.className = "user";
  div.id = id;
  div.innerHTML = "👤<br>" + name;
  usersDiv.appendChild(div);
}

function removeUser(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// micro
navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
  stream = s;

  addUser(socket.id, myName);

  socket.emit("join-room", {
    roomId,
    name: myName
  });
});

// mute
function toggleMute() {
  isMuted = !isMuted;
  stream.getAudioTracks()[0].enabled = !isMuted;
  document.getElementById("micBtn").innerHTML = isMuted ? "🔇" : "🎤";
}

// menu
function toggleMenu() {
  const m = document.getElementById("menu");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
}

// regalos
function sendGift(icon) {
  socket.emit("send-gift", { roomId, icon });
  showGift(icon);
}

function showGift(icon) {
  const div = document.createElement("div");
  div.className = "gift-animation";
  div.innerHTML = icon;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1000);
}

socket.on("receive-gift", ({ icon }) => showGift(icon));

socket.on("user-connected", ({ id, name }) => addUser(id, name));
socket.on("user-disconnected", id => removeUser(id));
</script>

</body>
</html>
