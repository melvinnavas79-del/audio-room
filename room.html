<!DOCTYPE html>
<html>
<head>
  <title>Sala - Coravox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6a11cb, #ff4ecd);
      color: white;
      text-align: center;
    }

    #users {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .user {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .mic {
      position: fixed;
      bottom: 100px;
      left: 20px;
      width: 70px;
      height: 70px;
      background: pink;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .openMenu {
      position: fixed;
      bottom: 100px;
      right: 20px;
      background: gold;
      padding: 15px;
      border-radius: 50%;
      font-size: 25px;
    }

    .menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #222;
      display: none;
      flex-wrap: wrap;
      padding: 10px;
    }

    .giftItem {
      width: 20%;
      padding: 10px;
      font-size: 25px;
    }

    .gift-animation {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      font-size: 60px;
      animation: pop 1s ease forwards;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
  </style>
</head>

<body>

<h2>🎤 Sala de voz</h2>

<div id="users"></div>

<div class="mic" onclick="toggleMute()" id="micBtn">🎤</div>

<div class="openMenu" onclick="toggleMenu()">🎁</div>

<div class="menu" id="menu">

<!-- 💥 20 REGALOS -->
<div class="giftItem" onclick="sendGift('🌹')">🌹</div>
<div class="giftItem" onclick="sendGift('💋')">💋</div>
<div class="giftItem" onclick="sendGift('❤️')">❤️</div>
<div class="giftItem" onclick="sendGift('👩‍❤️‍👨')">👩‍❤️‍👨</div>
<div class="giftItem" onclick="sendGift('💍')">💍</div>

<div class="giftItem" onclick="sendGift('🔥')">🔥</div>
<div class="giftItem" onclick="sendGift('😂')">😂</div>
<div class="giftItem" onclick="sendGift('🎤')">🎤</div>
<div class="giftItem" onclick="sendGift('🎈')">🎈</div>
<div class="giftItem" onclick="sendGift('🎵')">🎵</div>

<div class="giftItem" onclick="sendGift('💎')">💎</div>
<div class="giftItem" onclick="sendGift('👑')">👑</div>
<div class="giftItem" onclick="sendGift('🚗')">🚗</div>
<div class="giftItem" onclick="sendGift('🛩️')">🛩️</div>
<div class="giftItem" onclick="sendGift('🏰')">🏰</div>

<div class="giftItem" onclick="sendGift('🐉')">🐉</div>
<div class="giftItem" onclick="sendGift('🌌')">🌌</div>
<div class="giftItem" onclick="sendGift('⚡')">⚡</div>
<div class="giftItem" onclick="sendGift('💥')">💥</div>
<div class="giftItem" onclick="sendGift('🤑')">🤑</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const params = new URLSearchParams(window.location.search);
const roomId = params.get("room");

let stream;
let isMuted = false;
const myName = localStorage.getItem("username") || "User";

function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

// 🎁 ENVIAR REGALO
function sendGift(icon) {
  socket.emit("send-gift", {
    roomId,
    from: myName,
    icon
  });

  showGift(icon);
}

// 💥 ANIMACIÓN
function showGift(icon) {
  const div = document.createElement("div");
  div.className = "gift-animation";
  div.innerHTML = icon;

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 1000);
}

socket.on("receive-gift", ({ icon }) => {
  showGift(icon);
});

// 🎤 MICRO
navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
  stream = s;

  socket.emit("join-room", {
    roomId,
    name: myName
  });
});

// 🔇 MUTE
function toggleMute() {
  if (!stream) return;

  isMuted = !isMuted;

  stream.getAudioTracks().forEach(track => {
    track.enabled = !isMuted;
  });

  const btn = document.getElementById("micBtn");
  btn.innerHTML = isMuted ? "🔇" : "🎤";
}
</script>

</body>
</html>
