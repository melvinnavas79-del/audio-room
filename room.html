<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  text-align:center;
  font-family:Arial;
  background: linear-gradient(135deg,#6a11cb,#ff4ecd);
  color:white;
}

#users {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

.user {
  margin:10px;
}

button {
  position:fixed;
  bottom:20px;
}
</style>
</head>

<body>

<h2>🎤 Sala</h2>

<div id="users"></div>

<button onclick="mute()" id="btn">🎤</button>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const params = new URLSearchParams(location.search);
const roomId = params.get("room");

let stream;
let peers = {};
let muted = false;

const name = localStorage.getItem("username") || "User";

function addUser(id,n){
  let d=document.createElement("div");
  d.className="user";
  d.id=id;
  d.innerHTML="👤 "+n;
  users.appendChild(d);
}

function removeUser(id){
  let el=document.getElementById(id);
  if(el) el.remove();
}

navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
  stream=s;

  addUser(socket.id,name);

  socket.emit("join-room",{roomId,name});
});

function mute(){
  muted=!muted;
  stream.getAudioTracks()[0].enabled=!muted;
  btn.innerHTML=muted?"🔇":"🎤";
}

function createPeer(id){
  let p=new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  stream.getTracks().forEach(t=>p.addTrack(t,stream));

  p.ontrack=e=>{
    let a=new Audio();
    a.srcObject=e.streams[0];
    a.play();
  };

  p.onicecandidate=e=>{
    if(e.candidate){
      socket.emit("ice-candidate",{candidate:e.candidate,to:id});
    }
  };

  return p;
}

socket.on("user-connected", async ({id,name})=>{
  addUser(id,name);

  let p=createPeer(id);
  peers[id]=p;

  let offer=await p.createOffer();
  await p.setLocalDescription(offer);

  socket.emit("offer",{offer,to:id});
});

socket.on("offer", async ({offer,from})=>{
  let p=createPeer(from);
  peers[from]=p;

  await p.setRemoteDescription(offer);

  let answer=await p.createAnswer();
  await p.setLocalDescription(answer);

  socket.emit("answer",{answer,to:from});
});

socket.on("answer", async ({answer,from})=>{
  await peers[from].setRemoteDescription(answer);
});

socket.on("ice-candidate", async ({candidate,from})=>{
  if(peers[from]){
    await peers[from].addIceCandidate(candidate);
  }
});

socket.on("user-disconnected", id=>removeUser(id));
</script>

</body>
</html>
