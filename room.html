<!DOCTYPE html>
<html>
<head>
  <title>Sala - Coravox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6a11cb, #ff4ecd);
      color: white;
      text-align: center;
    }

    #users {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .user {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .mic {
      position: fixed;
      bottom: 100px;
      left: 20px;
      width: 70px;
      height: 70px;
      background: pink;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .gift {
      position: fixed;
      bottom: 100px;
      right: 20px;
      background: gold;
      padding: 15px;
      border-radius: 50%;
      font-size: 25px;
    }

    .exit {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: black;
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
    }

    /* 🔥 ANIMACIÓN */
    .gift-animation {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      font-size: 60px;
      animation: pop 1s ease forwards;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    #giftText {
      position: fixed;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h2>🎤 Sala de voz</h2>

<div id="users"></div>

<div id="giftText"></div>

<div class="mic" onclick="toggleMute()" id="micBtn">🎤</div>

<div class="gift" onclick="sendGift()">🎁</div>

<button class="exit" onclick="window.location.href='/'">Salir</button>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const params = new URLSearchParams(window.location.search);
const roomId = params.get("room");

let peer;
let stream;
let isMuted = false;
let gold = 100;

const usersDiv = document.getElementById("users");
const myName = localStorage.getItem("username") || "User";

// 👥 USUARIOS
function addUser(id, name) {
  const div = document.createElement("div");
  div.className = "user";
  div.id = id;

  div.innerHTML = `
    <div style="font-size:25px;">👤</div>
    <div>${name}</div>
  `;

  usersDiv.appendChild(div);
}

function removeUser(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// 🎤 MICRO
navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
  stream = s;

  addUser(socket.id, myName);

  const myAudio = document.createElement("audio");
  myAudio.srcObject = stream;
  myAudio.muted = true;
  myAudio.play();

  socket.emit("join-room", {
    roomId,
    name: myName
  });
});

// 🔇 MUTE
function toggleMute() {
  if (!stream) return;

  isMuted = !isMuted;

  stream.getAudioTracks().forEach(track => {
    track.enabled = !isMuted;
  });

  const btn = document.getElementById("micBtn");
  btn.innerHTML = isMuted ? "🔇" : "🎤";
  btn.style.background = isMuted ? "gray" : "pink";
}

// 🎁 REGALO
function sendGift() {
  if (gold < 10) return;

  gold -= 10;

  socket.emit("send-gift", {
    roomId,
    from: myName,
    amount: 10
  });

  showGift(myName + " envió 🎁");
}

function showGift(text) {
  const div = document.createElement("div");
  div.className = "gift-animation";
  div.innerHTML = "🎁";

  document.body.appendChild(div);

  const txt = document.getElementById("giftText");
  txt.innerText = text;

  setTimeout(() => {
    div.remove();
    txt.innerText = "";
  }, 1000);
}

socket.on("receive-gift", ({ from }) => {
  showGift(from + " envió 🎁");
});

// 🔥 PEER
function createPeer(userId) {
  const peer = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      {
        urls: "turn:openrelay.metered.ca:80",
        username: "openrelayproject",
        credential: "openrelayproject"
      }
    ]
  });

  peer.ontrack = (event) => {
    const audio = document.createElement("audio");
    audio.srcObject = event.streams[0];
    audio.play();
  };

  peer.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", {
        candidate: event.candidate,
        userId
      });
    }
  };

  return peer;
}

// EVENTOS
socket.on("user-connected", async ({ id, name }) => {
  addUser(id, name);

  peer = createPeer(id);

  stream.getTracks().forEach(track => peer.addTrack(track, stream));

  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);

  socket.emit("offer", { offer, userId: id });
});

socket.on("offer", async ({ offer, userId }) => {
  peer = createPeer(userId);

  stream.getTracks().forEach(track => peer.addTrack(track, stream));

  await peer.setRemoteDescription(offer);

  const answer = await peer.createAnswer();
  await peer.setLocalDescription(answer);

  socket.emit("answer", { answer, userId });
});

socket.on("answer", async ({ answer }) => {
  await peer.setRemoteDescription(answer);
});

socket.on("ice-candidate", async ({ candidate }) => {
  if (peer) {
    await peer.addIceCandidate(candidate);
  }
});

socket.on("user-disconnected", (userId) => {
  removeUser(userId);
});
</script>

</body>
</html>
