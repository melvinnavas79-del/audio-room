<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:linear-gradient(135deg,#6a11cb,#ff4ecd);
  color:white;
}

.user{
  background:rgba(255,255,255,0.2);
  margin:10px;
  padding:10px;
  border-radius:15px;
}

button{
  position:fixed;
  bottom:20px;
  border:none;
  padding:12px;
  border-radius:50%;
  font-size:18px;
}

#micBtn{left:20px;background:pink;}
#giftBtn{right:20px;background:gold;}
#musicBtn{right:90px;background:#00ffcc;}

.menu{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:none;
  flex-wrap:wrap;
}

.giftItem{
  width:25%;
  padding:10px;
  text-align:center;
  color:white;
}

.card{
  background:rgba(0,0,0,0.5);
  margin:10px;
  padding:15px;
  border-radius:15px;
}

</style>
</head>

<body>

<h2>AudioRoom PRO 🔥</h2>

<h3 id="gold">💰 Oro: 1000</h3>
<h3 id="vip">👑 VIP: 0</h3>
<h3 id="svip">💎 SVIP: 0</h3>

<div id="aristo"></div>

<div class="card">
💑 Pareja: <span id="pareja">Ninguna</span><br>
🏰 Clan: <span id="clan">Ninguno</span>
</div>

<div id="users"></div>

<button id="micBtn" onclick="toggleMic()">🎤</button>
<button id="musicBtn" onclick="toggleMusic()">🎶</button>
<button id="giftBtn" onclick="toggleMenu()">🎁</button>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div class="menu" id="menu">

<!-- 🎁 REGALOS PERSONALIZADOS -->
<div class="giftItem" onclick="sendGift('rosa')">
<img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" width="40"><br>Rosa 10
</div>

<div class="giftItem" onclick="sendGift('beso')">
<img src="https://cdn-icons-png.flaticon.com/512/742/742751.png" width="40"><br>Beso 20
</div>

<div class="giftItem" onclick="sendGift('diamante')">
<img src="https://cdn-icons-png.flaticon.com/512/616/616554.png" width="40"><br>Diamante 100
</div>

<div class="giftItem" onclick="sendGift('corona')">
<img src="https://cdn-icons-png.flaticon.com/512/616/616494.png" width="40"><br>Corona 200
</div>

<!-- 🎮 SISTEMA -->
<div onclick="buyVIP()">👑 VIP</div>
<div onclick="buySVIP()">💎 SVIP</div>
<div onclick="crearPareja()">💑 Pareja</div>
<div onclick="crearClan()">🏰 Clan</div>

</div>

<script>

const socket = io("http://207.180.235.220:4000");

let gold = 1000;
let vip = 0;
let svip = 0;

let pareja = localStorage.getItem("pareja") || "Ninguna";
let clan = localStorage.getItem("clan") || "Ninguno";

document.getElementById("pareja").innerText = pareja;
document.getElementById("clan").innerText = clan;

let gifts = {
 rosa:{price:10,img:"https://cdn-icons-png.flaticon.com/512/616/616490.png"},
 beso:{price:20,img:"https://cdn-icons-png.flaticon.com/512/742/742751.png"},
 diamante:{price:100,img:"https://cdn-icons-png.flaticon.com/512/616/616554.png"},
 corona:{price:200,img:"https://cdn-icons-png.flaticon.com/512/616/616494.png"}
};

function sendGift(name){
 if(gold < gifts[name].price){
  alert("No tienes oro");
  return;
 }
 gold -= gifts[name].price;
 document.getElementById("gold").innerText="💰 Oro: "+gold;
 showGift(name);
}

function showGift(name){
 let d=document.createElement("div");
 d.style.position="fixed";
 d.style.left="50%";
 d.style.top="60%";
 d.style.transform="translateX(-50%)";
 d.innerHTML=`<img src="${gifts[name].img}" width="120">`;
 document.body.appendChild(d);

 let pos=60;
 let anim=setInterval(()=>{
  pos--;
  d.style.top=pos+"%";
  if(pos<20){clearInterval(anim);d.remove();}
 },20);
}

function toggleMenu(){
 let m=document.getElementById("menu");
 m.style.display=m.style.display=="flex"?"none":"flex";
}

function toggleMusic(){
 let m=document.getElementById("music");
 if(m.paused){m.play();}else{m.pause();}
}

function toggleMic(){
 alert("Micrófono activo 🎤");
}

function buyVIP(){
 vip++;
 document.getElementById("vip").innerText="👑 VIP: "+vip;
}

function buySVIP(){
 svip++;
 document.getElementById("svip").innerText="💎 SVIP: "+svip;
}

function crearPareja(){
 let n=prompt("Nombre pareja");
 if(n){
  pareja=n;
  localStorage.setItem("pareja",n);
  document.getElementById("pareja").innerText=n;
 }
}

function crearClan(){
 let n=prompt("Nombre clan");
 if(n){
  clan=n;
  localStorage.setItem("clan",n);
  document.getElementById("clan").innerText=n;
 }
}

// 👑 ARISTOCRACIA PRO
let niveles=["Noble","Duque","Principe","Rey","Emperador"];
let nivel=0;

function renderAristo(){
 document.getElementById("aristo").innerHTML=
 `<div class="card"><b>🏆 ${niveles[nivel]}</b></div>`;
}

renderAristo();

</script>

</body>
</html>
