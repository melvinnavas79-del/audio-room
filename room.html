<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  text-align:center;
  font-family:Arial;
  background: linear-gradient(135deg,#6a11cb,#ff4ecd);
  color:white;
}

#users {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

.user {
  margin:10px;
}

button {
  position:fixed;
  bottom:20px;
  padding:10px;
  border-radius:20px;
  border:none;
}

#micBtn {
  left:20px;
  background:pink;
}

#giftBtn {
  right:20px;
  background:gold;
}

.gift {
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:60px;
}
</style>
</head>

<body>

<h2>🎤 Sala</h2>

<div id="users"></div>

<button onclick="mute()" id="micBtn">🎤</button>
<button onclick="sendGift('🎁')" id="giftBtn">🎁</button>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const params = new URLSearchParams(location.search);
const roomId = params.get("room");

let stream;
let peers = {};
let muted = false;

const name = localStorage.getItem("username") || "User";
const usersDiv = document.getElementById("users");

// 👥 usuarios
function addUser(id,n){
  let d=document.createElement("div");
  d.className="user";
  d.id=id;
  d.innerHTML="👤 "+n;
  usersDiv.appendChild(d);
}

function removeUser(id){
  let el=document.getElementById(id);
  if(el) el.remove();
}

// 🎤 audio
navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
  stream=s;

  addUser(socket.id,name);

  socket.emit("join-room",{roomId,name});
});

// 🔇 mute
function mute(){
  muted=!muted;
  stream.getAudioTracks()[0].enabled=!muted;
  document.getElementById("micBtn").innerHTML=muted?"🔇":"🎤";
}

// 🎁 regalos
function sendGift(icon){
  socket.emit("send-gift",{roomId,icon});
  showGift(icon);
}

function showGift(icon){
  let d=document.createElement("div");
  d.className="gift";
  d.innerHTML=icon;

  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}

socket.on("receive-gift",({icon})=>{
  showGift(icon);
});

// 🔥 WEBRTC AUDIO REAL
function createPeer(id){
  let p=new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  stream.getTracks().forEach(t=>p.addTrack(t,stream));

  p.ontrack=e=>{
    let a=new Audio();
    a.srcObject=e.streams[0];
    a.play();
  };

  p.onicecandidate=e=>{
    if(e.candidate){
      socket.emit("ice-candidate",{candidate:e.candidate,to:id});
    }
  };

  return p;
}

// conexión
socket.on("user-connected", async ({id,name})=>{
  addUser(id,name);

  let p=createPeer(id);
  peers[id]=p;

  let offer=await p.createOffer();
  await p.setLocalDescription(offer);

  socket.emit("offer",{offer,to:id});
});

socket.on("offer", async ({offer,from})=>{
  let p=createPeer(from);
  peers[from]=p;

  await p.setRemoteDescription(offer);

  let answer=await p.createAnswer();
  await p.setLocalDescription(answer);

  socket.emit("answer",{answer,to:from});
});

socket.on("answer", async ({answer,from})=>{
  await peers[from].setRemoteDescription(answer);
});

socket.on("ice-candidate", async ({candidate,from})=>{
  if(peers[from]){
    await peers[from].addIceCandidate(candidate);
  }
});

socket.on("user-disconnected", id=>removeUser(id));
</script>

</body>
</html>
