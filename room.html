<!DOCTYPE html>
<html>
<head>
  <title>Sala - Coravox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #6a11cb, #ff4ecd);
      color: white;
      text-align: center;
    }

    h2 {
      margin-top: 20px;
    }

    .users {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .user {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      margin: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic {
      margin-top: 40px;
      background: #ff4ecd;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: white;
      color: black;
    }
  </style>
</head>

<body>

<h2>🎤 Sala de voz</h2>

<div class="users">
  <div class="user">😀</div>
  <div class="user">😎</div>
  <div class="user">🔥</div>
  <div class="user">🎧</div>
</div>

<div class="mic">🎤</div>

<button class="btn" onclick="goBack()">Salir</button>

<script>
function goBack(){
  window.location.href = "/";
}
</script>

</body>
</html>
